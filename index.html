<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat Positivliste Søger</title>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8">

    <div class="max-w-5xl mx-auto" 
         x-data="{ 
            query: '', 
            allData: [], 
            loading: true,
            error: null,
            
            async init() {
                try {
                    const response = await fetch('data.json?t=' + Date.now());
                    if (!response.ok) throw new Error('Kunne ikke hente data.json');
                    this.allData = await response.json();
                } catch (e) {
                    this.error = 'Fejl ved indlæsning af data: ' + e.message;
                } finally {
                    this.loading = false;
                }
            },

            get filteredData() {
                if (!this.query || this.query.trim().length < 2) return [];
                
                // Intelligent søgning: Splitter input op i ord
                const searchTerms = this.query.toLowerCase().trim().split(/\s+/);
                
                return this.allData.filter(row => {
                    // Vi samler alt indhold i rækken til én søgbar streng
                    const rowContent = Object.values(row).join(' ').toLowerCase();
                    
                    // Alle søgeord skal findes i rækken (AND-logik)
                    return searchTerms.every(term => rowContent.includes(term));
                }).slice(0, 100); // Begræns til de første 100 hits for performance
            }
         }">

        <header class="mb-8 text-center md:text-left">
            <h1 class="text-4xl font-extrabold text-slate-900 tracking-tight">
                Skat Positivliste Søger
            </h1>
            <p class="text-slate-600 mt-2">
                Søg intelligent i investeringsforeninger og selskaber (2021-2026)
            </p>
        </header>

        <div x-show="loading" class="flex items-center justify-center p-12">
            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div>
            <span class="ml-3 text-slate-600">Henter database...</span>
        </div>

        <div x-show="error" x-cloak class="p-4 mb-6 bg-red-50 border-l-4 border-red-500 text-red-700">
            <p x-text="error"></p>
        </div>

        <div class="sticky top-4 z-10 mb-8" x-show="!loading" x-cloak>
            <div class="relative group">
                <input type="text" 
                       x-model="query" 
                       placeholder="Prøv f.eks. 'iShares 600' eller 'Danske Invest CVR'..." 
                       class="w-full p-5 pl-6 text-lg border-none rounded-2xl shadow-xl ring-1 ring-slate-200 focus:ring-2 focus:ring-blue-500 outline-none transition-all"
                >
                <div class="absolute right-5 top-5 text-slate-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                </div>
            </div>
            <div class="mt-3 flex justify-between px-2 text-xs text-slate-500 font-medium uppercase tracking-wider">
                <span x-text="'Database: ' + allData.length + ' rækker'"></span>
                <span x-show="query.length >= 2" x-text="'Fundet: ' + filteredData.length + ' hits'"></span>
            </div>
        </div>

        <div class="space-y-4 pb-20">
            <div x-show="!query" class="text-center py-20 bg-white rounded-3xl border border-dashed border-slate-300">
                <p class="text-slate-400">Indtast søgeord for at begynde</p>
            </div>

            <div x-show="query.length >= 2 && filteredData.length === 0" x-cloak 
                 class="text-center py-20 bg-white rounded-3xl shadow-sm border border-slate-200">
                <p class="text-slate-500 text-lg">Ingen resultater matcher "<span class="font-bold" x-text="query"></span>"</p>
                <p class="text-slate-400 text-sm mt-2">Prøv at bruge færre eller andre søgeord.</p>
            </div>

            <template x-for="(item, index) in filteredData" :key="index">
                <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200 hover:border-blue-300 hover:shadow-md transition-all">
                    
                    <h2 class="text-xl font-bold text-slate-800 mb-4 leading-tight" 
                        x-text="item['Navn afdeling/Name Sub-fund'] && item['Navn afdeling/Name Sub-fund'] !== '[tom]' 
                                ? item['Navn afdeling/Name Sub-fund'] 
                                : item['Navn/Name']">
                    </h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-sm">
                        <template x-for="[key, value] in Object.entries(item)">
                            <div class="flex flex-col border-b border-slate-50 pb-2" 
                                 x-show="value && value !== '[tom]' && key !== 'Navn afdeling/Name Sub-fund'">
                                <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1" x-text="key"></span>
                                <span class="text-slate-700 font-medium" x-text="value"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>
        </div>

    </div>

</body>
</html>
