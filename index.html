<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skat Positivliste Søger</title>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">
    <div x-data="{ 
        query: '', 
        allData: [], 
        loading: true,
        error: null,
        
        get filteredData() {
            if (!this.query || this.query.trim().length < 2) return [];
            
            // Intelligent søgning: Splitter input op i enkelte ord
            const searchTerms = this.query.toLowerCase().trim().split(/\s+/);
            
            return this.allData.filter(row => {
                // Samler alle værdier i rækken til én søgbar tekst
                const rowContent = Object.values(row).join(' ').toLowerCase();
                
                // Tjekker om ALLE ord fra søgningen findes i rækken
                return searchTerms.every(term => rowContent.includes(term));
            }).slice(0, 100);
        },

        async initData() {
            try {
                // Tilføj timestamp for at undgå browser-cache
                const response = await fetch('data.json?t=' + Date.now());
                if (!response.ok) throw new Error('Kunne ikke hente data.json');
                this.allData = await response.json();
                this.loading = false;
            } catch (e) {
                this.error = e.message;
                this.loading = false;
            }
        }
    }" x-init="initData()">
        
        <div class="max-w-4xl mx-auto">
            <h1 class="text-3xl font-bold mb-2 text-blue-900">Skat Positivliste Søger</h1>
            <p class="mb-6 text-gray-600">Søg i data fra Skats liste (2021-2026)</p>
            
            <template x-if="loading">
                <div class="p-4 mb-4 bg-blue-100 text-blue-700 rounded">Indlæser database...</div>
            </template>
            
            <template x-if="error">
                <div class="p-4 mb-4 bg-red-100 text-red-700 rounded" x-text="'Fejl: ' + error"></div>
            </template>

            <div class="relative mb-8" x-show="!loading" x-cloak>
                <input type="text" x-model="query" 
                       placeholder="Søg intelligent (f.eks. 'iShares 600')..." 
                       class="w-full p-4 border-2 border-blue-200 rounded-lg shadow-sm focus:border-blue-500 focus:outline-none text-lg">
                <div class="mt-2 text-sm text-gray-500">
                    Total antal rækker i databasen: <span x-text="allData.length"></span>
                </div>
            </div>

            <div class="space-y-4" x-show="!loading" x-cloak>
                <template x-if="query.length >= 2 && filteredData.length === 0">
                    <p class="text-center p-8 bg-white rounded shadow text-gray-500">
                        Ingen resultater fundet for "<span x-text="query"></span>".
                    </p>
                </template>

                <template x-for="(item, index) in filteredData" :key="index">
                    <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-600 hover:shadow-lg transition-shadow">
                        <h3 class="font-bold text-xl mb-4 text-blue-800" 
                            x-text="item['Navn afdeling/Name Sub-fund'] && item['Navn afdeling/Name Sub-fund'] !== '[tom]' 
                                    ? item['Navn afdeling/Name Sub-fund'] 
                                    : item['Navn/Name']"></h3>
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-2 text-sm">
                            <template x-for="[key, value] in Object.entries(item)">
                                <div class="flex flex-col border-b border-gray-50 pb-1" 
                                     x-show="value && value !== '[tom]' && key !== 'Navn afdeling/Name Sub-fund'">
                                    <span class="font-semibold text-gray-400 text-[10px] uppercase tracking-wider" x-text="key"></span>
                                    <span class="text-gray-800" x-text="value"></span>
                                </div>
                            </template>
                        </div>
                    </div>
                </template>
            </div>
        </div>
    </div>
</body>
</html>
